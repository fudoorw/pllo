<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/reports-common.css">
</head>

<body>
    <div class="dp">
        <div class="crumb">
            <span class="cs"><i class="fas fa-user-tag" style="color:var(--yellow)"></i> Customer Report</span>
            <span class="ca">›</span>
            <span class="cc">Customer List</span>
        </div>

        <div class="dstats">
            <div class="ds">
                <div class="ds-l">Total Customers</div>
                <div class="ds-v" id="h-cust-count">0</div>
            </div>
            <div class="ds">
                <div class="ds-l">Total Outstanding</div>
                <div class="ds-v" id="h-cust-out" style="color:var(--red)">0 Ks</div>
            </div>
        </div>

        <div class="tshell">
            <table>
                <thead>
                    <tr>
                        <th>Customer Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Address</th>
                        <th>Outstanding Amount</th>
                    </tr>
                </thead>
                <tbody id="tb-customer-report"></tbody>
            </table>
        </div>
        <div class="pager" id="pg-customer-report"></div>
    </div>

    <script src="../js/reports-common.js"></script>
    <script>
        const TYPE = 'customer-report';

        function renderV() {
            const body = document.getElementById('tb-' + TYPE);
            if (!body) return;

            const totalOut = DATA.reduce((a, b) => a + (b.out || 0), 0);
            document.getElementById('h-cust-count').innerText = DATA.length;
            document.getElementById('h-cust-out').innerText = fmt(totalOut) + ' Ks';

            if (DATA.length === 0) {
                body.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:38px;color:var(--t4)"><i class="fas fa-inbox" style="font-size:22px;display:block;margin-bottom:6px;opacity:.25"></i>No records found</td></tr>';
            } else {
                const sl = DATA.slice(pg * PS, (pg + 1) * PS);
                body.innerHTML = sl.map(r => `
                    <tr>
                        <td class="te">${r.name}</td>
                        <td class="tm">${r.phone}</td>
                        <td class="tx">${r.email}</td>
                        <td class="tx">${r.addr}</td>
                        <td class="ta" style="color:var(--red);font-weight:600">${fmt(r.out)}</td>
                    </tr>
                `).join('');
            }
            renderPager(TYPE, DATA.length);
        }

        async function refresh() {
            await fetchData(TYPE);
            renderV();
        }

        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            srch = params.get('q') || '';
            dF = params.get('df') || '';
            dT = params.get('dt') || '';
            refresh();
        });
    </script>
</body>

</html>
