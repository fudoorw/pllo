<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Selling Item Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/reports-common.css">
</head>

<body>
    <div class="dp">
        <div class="crumb">
            <span class="cs"><i class="fas fa-boxes" style="color:var(--blue)"></i> Stock Report</span>
            <span class="ca">›</span>
            <span class="cc">Top Selling Items</span>
        </div>

        <div class="dstats">
            <div class="ds">
                <div class="ds-l">Items Tracked</div>
                <div class="ds-v" id="h-top-count">0</div>
            </div>
            <div class="ds">
                <div class="ds-l">Total Volume</div>
                <div class="ds-v" id="h-top-vol">0</div>
            </div>
        </div>

        <div class="tshell">
            <table>
                <thead>
                    <tr>
                        <th class="col-m">
                            <div class="cell-container">ITEM CODE</div>
                        </th>
                        <th class="col-m">
                            <div class="cell-container">BARCODE</div>
                        </th>
                        <th class="col-l">
                            <div class="cell-container">DESCRIPTION</div>
                        </th>
                        <th class="col-m">
                            <div class="cell-container">CATEGORY</div>
                        </th>
                        <th class="col-m">
                            <div class="cell-container">SUB-CATEGORY</div>
                        </th>
                        <th class="col-m">
                            <div class="cell-container">BRAND</div>
                        </th>
                        <th class="col-s">
                            <div class="cell-container">PRICE</div>
                        </th>
                        <th class="col-s">
                            <div class="cell-container">SALE QTY</div>
                        </th>
                        <th class="col-m">
                            <div class="cell-container">TOTAL AMOUNT</div>
                        </th>
                        <th class="col-m">
                            <div class="cell-container">SHOP</div>
                        </th>
                        <th class="col-m">
                            <div class="cell-container">SUPPLIER</div>
                        </th>
                    </tr>
                </thead>
                <tbody id="tb-top-selling"></tbody>
            </table>
        </div>
        <div class="pager" id="pg-top-selling"></div>
    </div>

    <script src="../js/reports-common.js"></script>
    <script>
        const TYPE = 'top-selling';

        function renderV() {
            const body = document.getElementById('tb-' + TYPE);
            if (!body) return;

            const totalQty = DATA.reduce((a, b) => a + (b.qty || 0), 0);
            document.getElementById('h-top-count').innerText = DATA.length;
            document.getElementById('h-top-vol').innerText = fmt(totalQty);

            if (DATA.length === 0) {
                body.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:38px;color:var(--t4)"><i class="fas fa-inbox" style="font-size:22px;display:block;margin-bottom:6px;opacity:.25"></i>No records found</td></tr>';
            } else {
                const sl = DATA.slice(pg * PS, (pg + 1) * PS);
                body.innerHTML = sl.map((r, i) => `
                    <tr>
                        <td><div class="cell-container">${r.itemCode}</div></td>
                        <td><div class="cell-container">${r.barcode}</div></td>
                        <td class="tm te"><div class="cell-container">${r.description}</div></td>
                        <td><div class="cell-container">${r.category}</div></td>
                        <td><div class="cell-container">${r.subCategory}</div></td>
                        <td><div class="cell-container">${r.brand}</div></td>
                        <td class="ta"><div class="cell-container">${fmt(r.price)}</div></td>
                        <td class="ta"><div class="cell-container">${fmt(r.qty)}</div></td>
                        <td class="ta tm te"><div class="cell-container">${fmt(r.total)}</div></td>
                        <td><div class="cell-container">${r.shop}</div></td>
                        <td><div class="cell-container">${r.supplier}</div></td>
                    </tr>
                `).join('');
            }
            renderPager(TYPE, DATA.length);
        }

        async function refresh() {
            await fetchData(TYPE);
            renderV();
        }

        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            srch = params.get('q') || '';
            dF = params.get('df') || '';
            dT = params.get('dt') || '';
            refresh();
        });
    </script>
</body>

</html>
