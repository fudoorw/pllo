<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: 16px;
            --accent-glow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        body {
            background: #121212;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            min-height: 100vh;
        }

        body.embedded {
            background: transparent;
            background-image: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--space-xl);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: var(--space-2xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            margin: 0;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.3);
            margin-bottom: var(--space-xl);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: var(--space-xl);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--glass-border);
        }

        .section-header h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: var(--space-lg);
        }

        .field-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .excel-input {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .excel-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            box-shadow: var(--shadow-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .api-key-display {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .api-key-value {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            word-break: break-all;
        }

        .btn-icon {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>API Infrastructure</h2>
            <i class="fas fa-microchip text-indigo-500/50 text-2xl"></i>
        </div>

        <div class="glass-card">
            <div class="section-header">
                <i class="fas fa-sms text-indigo-400"></i>
                <h3>SMS Gateway</h3>
            </div>
            <form id="smsApiForm">
                <div class="form-group">
                    <label class="field-label">Provider</label>
                    <select id="smsProvider" class="excel-input">
                        <option value="twilio">Twilio</option>
                        <option value="nexmo">Nexmo</option>
                        <option value="custom">Custom Implementation</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="field-label">API Key</label>
                    <input type="text" id="smsApiKey" class="excel-input" placeholder="Enter API key">
                </div>
                <div class="form-group">
                    <label class="field-label">API Secret</label>
                    <input type="password" id="smsApiSecret" class="excel-input" placeholder="Enter API secret">
                </div>
                <div class="form-group">
                    <label class="field-label">Sender Identifier</label>
                    <input type="text" id="smsSenderId" class="excel-input" placeholder="Enter sender ID">
                </div>
                <button type="submit" class="btn-primary">Update SMS Config</button>
            </form>
        </div>

        <div class="glass-card">
            <div class="section-header">
                <i class="fas fa-credit-card text-pink-400"></i>
                <h3>Payment Gateway</h3>
            </div>
            <form id="paymentApiForm">
                <div class="form-group">
                    <label class="field-label">Service Provider</label>
                    <select id="paymentGateway" class="excel-input">
                        <option value="stripe">Stripe</option>
                        <option value="paypal">PayPal</option>
                        <option value="square">Square</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="field-label">Publishable Key</label>
                    <input type="text" id="paymentPublicKey" class="excel-input" placeholder="Enter publishable key">
                </div>
                <div class="form-group">
                    <label class="field-label">Secret Key</label>
                    <input type="password" id="paymentSecretKey" class="excel-input" placeholder="Enter secret key">
                </div>
                <button type="submit" class="btn-primary">Update Payment Config</button>
            </form>
        </div>

        <div class="glass-card">
            <div class="section-header">
                <i class="fas fa-link text-emerald-400"></i>
                <h3>Webhooks</h3>
            </div>
            <div class="form-group">
                <label class="field-label">Endpoint URL</label>
                <div class="api-key-display">
                    <div class="api-key-value" id="webhookUrl">https://yourapp.com/api/webhook</div>
                    <button class="btn-icon" onclick="copyWebhook()" title="Copy to clipboard">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api-settings.js"></script>
</body>

</html>
