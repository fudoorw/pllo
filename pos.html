                                <span class="product-meta">Code: ${p.item_code || '—'} | Wh Stock: <span class="${p.stock > 0 ? 'text-emerald-400' : 'text-red-400'}">${p.stock}</span></span>
                            </div>
                            <span class="product-price">${Math.round(p.price)}</span>
                        </div>
                    `).join('');
                },

                addFromResult(productId) {
                    const product = this.state.allProducts.find(p => p.id === productId);
                    if (product) {
                        this.addToCart(product, true);
                        document.getElementById('search-input').value = '';
                        document.getElementById('search-results').style.display = 'none';
                    }
                },

                handleSearch(query) {
                    const q = query.toLowerCase();
                    const product = this.state.allProducts.find(p =>
                        (p.code && p.code.toLowerCase() === q) ||
                        (p.item_code && p.item_code.toLowerCase() === q) ||
                        (p.barcodes && p.barcodes.includes(query)) ||
                        (p.name && p.name.toLowerCase().includes(q))
                    );
                    if (product) {
                        this.addToCart(product, true);
                        document.getElementById('search-results').style.display = 'none';
                    }
                },

                addToCart(product, keepSearchFocus = false) {
                    const existingIdx = this.state.cart.findIndex(i => i.id === product.id);
                    if (existingIdx > -1) {
                        this.state.cart[existingIdx].qty += 1;
                        this.state.selectedItemIndex = existingIdx;
                    } else {
                        this.state.cart.push({
                            id: product.id,
                            code: product.code || product.item_code || '',
                            name: product.name,
                            price: parseFloat(product.price) || 0,
                            base_price: parseFloat(product.price) || 0,
                            box_price: parseFloat(product.box_price) || 0,
                            disc: parseFloat(product.discount) || 0,
                            qty: 1,
                            pcs_per_box: product.pcs_per_box || 1,
                            unit_id: product.unit_id,
                            base_unit: product.unit || 'pc',
                            selectedUnit: 'base'
                        });
                        this.state.selectedItemIndex = this.state.cart.length - 1;
                    }

                    if (keepSearchFocus) {
                        this.state.inputMode = null; // Prevent grid focus theft
                        this.renderCart();
                        this.calculateTotals();
                        document.getElementById('search-input').focus();
                    } else {
                        this.state.inputMode = 'qty';
                        this.state.currentInput = "0";
                        this.state.resetNextInput = true;
                        this.renderCart();
                        this.calculateTotals();
                    }
                },

                // --- HOLD / DRAFT LOGIC ---
                actionHold() {
                    if (this.state.cart.length === 0) return alert("Cart is empty");
                    const voucher = document.getElementById('voucher').value;
                    const custSelect = document.getElementById('customer-id');
                    const customerName = custSelect.options[custSelect.selectedIndex]?.text || "Walk-in";
                    const total = document.getElementById('display-grand-total').value;

                    const draft = {
                        id: Date.now(),
                        voucher: voucher,
                        customer: customerName,
                        total: total,
                        cart: JSON.parse(JSON.stringify(this.state.cart)),
                        metadata: {
                            warehouseId: document.getElementById('warehouse-id').value,
                            customerId: custSelect.value,
                            counter: document.getElementById('counter').value,
                            table: document.getElementById('table').value,
                            tax: document.getElementById('tax-input').value,
                            disc: document.getElementById('discount-input').value,
                            discType: document.getElementById('discount-type').value,

                            remark: document.getElementById('remark').value
                        }
                    };

                    const drafts = JSON.parse(localStorage.getItem('pos_drafts') || '[]');

                    localStorage.setItem('pos_drafts', JSON.stringify(drafts));

                    // Automatically clear cart after hold
                    this.resetPOS();
                    console.log("Draft saved and cart cleared.");
                },

                    let modal = document.getElementById('hold-list-modal');
                    if (!modal) {
                        modal = document.createElement('div');
                        modal.id = 'hold-list-modal';
                        modal.className = 'fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-md p-4';

                    }

                                <tbody class="divide-y divide-white/5">

                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="mt-4 pt-4 border-t border-white/10 flex justify-between items-center">
                            <div class="text-[10px] text-slate-500 italic">
                                Double-click or Double-tap to load draft.
                            </div>
                            <button onclick="localStorage.removeItem('pos_drafts'); app.actionHoldList();" class="text-[9px] font-black text-red-400 uppercase tracking-widest hover:text-red-300 transition-colors">
                                Clear All Drafts
                            </button>
                        </div>
                    </div >
                `;
                },

                handleDoubleTap(e, id) {
                    const now = Date.now();
                    const DOUBLE_TAP_DELAY = 300;
                    if (now - this.state.lastTap < DOUBLE_TAP_DELAY) {
                        e.preventDefault();
                        this.loadHoldItem(id);
                    }
                    this.state.lastTap = now;
                },

                loadHoldItem(id) {
                    const drafts = JSON.parse(localStorage.getItem('pos_drafts') || '[]');
                    const draftIdx = drafts.findIndex(d => d.id === id);
                    if (draftIdx === -1) return;
                    const draft = drafts[draftIdx];

                    // Load Metadata
                    document.getElementById('voucher').value = draft.voucher;
                    document.getElementById('warehouse-id').value = draft.metadata.warehouseId;
                    document.getElementById('customer-id').value = draft.metadata.customerId;
                    document.getElementById('counter').value = draft.metadata.counter;
                    document.getElementById('table').value = draft.metadata.table;
                    document.getElementById('tax-input').value = draft.metadata.tax;
                    document.getElementById('discount-input').value = draft.metadata.disc;
                    document.getElementById('discount-type').value = draft.metadata.discType;
                    document.getElementById('shipping-input').value = draft.metadata.ship;
                    document.getElementById('remark').value = draft.metadata.remark;

                    // Load Cart
                    this.state.cart = draft.cart;
                    this.state.selectedItemIndex = -1;
                    this.renderCart();
                    this.calculateTotals();

                    // Remove from drafts and update UI
                    drafts.splice(draftIdx, 1);
                    localStorage.setItem('pos_drafts', JSON.stringify(drafts));

                    const modal = document.getElementById('hold-list-modal');
                    if (modal) modal.remove();
                    document.getElementById('search-input').focus();
                },

                async finalizeSale(shouldPrint) {
                    if (this.state.cart.length === 0) return;

                    const subtotal = this.state.cart.reduce((sum, item) => {
                        const effectiveQty = (item.selectedUnit === 'box') ? (item.qty * (item.pcs_per_box || 1)) : item.qty;
                        return sum + (effectiveQty * item.price);
                    }, 0);
                    const itemDiscounts = this.state.cart.reduce((sum, item) => sum + (item.disc || 0), 0);
                    const taxPercent = parseFloat(document.getElementById('tax-input')?.value) || 0;
                    const discountValue = parseFloat(document.getElementById('discount-input')?.value) || 0;
                    const discountType = document.getElementById('discount-type')?.value;
                    const shipping = parseFloat(document.getElementById('shipping-input')?.value) || 0;

                    const globalDiscount = discountType === 'percent' ? ((subtotal - itemDiscounts) * discountValue / 100) : discountValue;
                    const totalDiscount = itemDiscounts + globalDiscount;
                    const total = (subtotal - totalDiscount) + ((subtotal - totalDiscount) * taxPercent / 100) + shipping;
                    const paid = parseFloat(document.getElementById('display-paid').value) || 0;

                    try {
                        // Calculate payment status for filtering
                        let paymentStatus = 'UNPAID';
                        if (paid >= (total - 0.5)) { // Small margin for rounding
                            paymentStatus = 'PAID';
                        } else if (paid > 0) {
                            paymentStatus = 'PARTIAL';
                        }

                        const custSelect = document.getElementById('customer-id');
                        const customerName = custSelect.options[custSelect.selectedIndex]?.text || "Walk-in";

                        const transactionData = {
                            id: this.state.editingSaleId || undefined, // Include ID if editing
                            voucher_no: document.getElementById('voucher').value,
                            warehouse_id: document.getElementById('warehouse-id').value || null,
                            customer_id: document.getElementById('customer-id').value || null,
                            customer_name: customerName,
                            counter: document.getElementById('counter').value || null,
                            user_id: document.getElementById('counter').value || null,
                            subtotal: subtotal,
                            total_amount: total,
                            total: total,
                            paid_amount: paid,
                            tax_percent: taxPercent,
                            tax_amount: (subtotal - totalDiscount) * taxPercent / 100,
                            discount_value: discountValue,
                            discount_type: discountType,
                            discount_amount: totalDiscount,
                            shipping_amount: shipping,
                            payment_method: this.state.paymentMethod,
                            transaction_status: this.state.transactionStatus,
                            payment_status: paymentStatus,
                            payment_details: this.state.paymentMethod === 'Multi' ? this.state.paymentSplits : null,
                            items: this.state.cart,
                            cashier: this.state.cashierName
                        };

                        const { data: rpcResult, error: rpcError } = await supabase.rpc('process_pos_sale', {
                            tx_data: transactionData,
                            payments_data: paid > 0 ? (this.state.paymentMethod === 'Multi' ? Object.entries(this.state.paymentSplits)
                                .filter(([method, amount]) => amount > 0)
                                .map(([method, amount]) => ({
                                    amount: amount,
                                    payment_method: method === 'secondary' ? this.state.secondaryMethod : method,
                                    payment_date: new Date().toISOString().split('T')[0],
                                    note: 'POS Multi Payment'
                                })) : [{
                                    amount: paid,
                                    payment_method: this.state.paymentMethod,
                                    payment_date: new Date().toISOString().split('T')[0],
                                    note: 'POS Single Payment'
                                }]) : [],
                            items_data: this.state.cart.map(item => ({
                                product_id: item.id,
                                product_name: item.name,
                                quantity: (item.selectedUnit === 'box') ? (item.qty * (item.pcs_per_box || 1)) : item.qty,
                                price: item.price,
                                subtotal: (((item.selectedUnit === 'box') ? item.qty * (item.pcs_per_box || 1) : item.qty) * item.price) - (item.disc || 0),
                                discount: item.disc || 0
                            }))
                        });

                        if (rpcError) throw rpcError;

                        this.state.editingSaleId = null; // Clear edit state after success
                        this.resetPOS();
                        if (shouldPrint) {
                            const custSelect = document.getElementById('customer-id');
                            const customerName = custSelect.options[custSelect.selectedIndex]?.text || "Walk-in";

                            // Call the modular printer chunk
                            ReceiptPrinter.print({
                                ...transactionData,
                                customer_name: customerName
                            });
                        }
                    } catch (e) {
                        console.error("Sale Error:", e);
                        alert("Failed to save transaction: " + (e.message || e));
                    }
                },

                resetPOS() {
                    this.state.cart = [];
                    this.state.editingSaleId = null;
                    this.state.manualPaid = false;
                    this.generateVoucherNo();
                    this.renderCart();
                    this.calculateTotals();
                    document.getElementById('search-input').focus();
                },

                clearCart() {
                    if (confirm("Are you sure you want to clear the entire cart?")) {
                        this.resetPOS();
                    }
                },

                actionSales() {
                    const counterId = document.getElementById('counter').value;
                    const container = document.getElementById('internal-sales-view');
                    const iframe = document.getElementById('salePosInternalIframe');
                    container.classList.remove('hidden');

                    // If iframe is already loaded, send message. Otherwise set src.
                    try {
                        if (iframe.contentWindow) {
                            iframe.contentWindow.postMessage({ type: 'REFRESH_SALES', counterId: counterId }, '*');
                        }
                    } catch (e) {
                        console.log("PostMessage failed, falling back to src change");
                    }

                    if (!iframe.src || iframe.src === '' || iframe.src.indexOf('sale-pos.html') === -1) {
                        iframe.src = `sale-pos.html?counter=${counterId}&t=${Date.now()}`;
                    }
                },

                closeInternalSales() {
                    document.getElementById('internal-sales-view').classList.add('hidden');
                },

                async editSale(saleId) {
                    try {
                        // 1. Fetch Sale Data
                        const { data: sale, error: saleError } = await supabase
                            .from('transactions')
                            .select('*')
                            .eq('id', saleId)
                            .single();

                        if (saleError) throw saleError;

                        // 2. Fetch Sale Items
                        const { data: items, error: itemsError } = await supabase
                            .from('transaction_items')
                            .select('*')
                            .eq('transaction_id', saleId);

                        if (itemsError) throw itemsError;

                        // 3. Clear Current Cart (no confirmation)
                        this.clearCart(true);

                        // 4. Set Metadata
                        this.state.editingSaleId = saleId;
                        document.getElementById('voucher').value = sale.voucher_no;
                        document.getElementById('warehouse-id').value = sale.warehouse_id || '';
                        document.getElementById('customer-id').value = sale.customer_id || '';
                        document.getElementById('counter').value = sale.counter || '';
                        document.getElementById('tax-input').value = sale.tax_percent || 0;
                        document.getElementById('discount-input').value = sale.discount_value || 0;
                        document.getElementById('discount-type').value = sale.discount_type || 'fixed';
                        document.getElementById('shipping-input').value = sale.shipping_amount || 0;
                        document.getElementById('remark').value = sale.remark || '';

                        // 5. Load Items into Cart
                        this.state.cart = items.map(item => ({
                            id: item.product_id,
                            name: item.product_name,
                            qty: item.quantity,
                            price: item.price,
                            base_price: item.price, // fallback
                            disc: item.discount || 0,
                            selectedUnit: 'base', // Default to base on edit for simplicity
                            pcs_per_box: 1, // Will be updated if product is found in state.allProducts
                            unit_id: null,
                            base_unit: 'pc'
                        }));

                        // Try to enrich item data from allProducts if available
                        if (this.state.allProducts.length > 0) {
                            this.state.cart = this.state.cart.map(cartItem => {
                                const p = this.state.allProducts.find(prod => prod.id === cartItem.id);
                                if (p) {
                                    return {
                                        ...cartItem,
                                        pcs_per_box: p.pcs_per_box || 1,
                                        unit_id: p.unit_id,
                                        base_unit: p.unit || 'pc',
                                        base_price: p.price,
                                        box_price: p.box_price // Correctly load box_price during edit
                                    };
                                }
                                return cartItem;
                            });
                        }

                        // 6. Finalize UI
                        this.state.paymentMethod = sale.payment_method || 'Cash';
                        this.state.transactionStatus = sale.transaction_status || 'cash';
                        document.getElementById('display-paid').value = sale.paid_amount || 0;
                        
                        this.renderCart();
                        this.calculateTotals();
                        this.buildPaymentMethods();
                        this.closeInternalSales();
                        
                        console.log("Sale loaded for editing:", saleId);
                    } catch (e) {
                        console.error("Edit Sale Error:", e);
                        alert("Failed to load sale: " + e.message);
                    }
                },

                async printSale(saleId) {
                    try {
                        console.log("Fetching sale for printing:", saleId);
                        const { data: sale, error } = await supabase
                            .from('transactions')
                            .select('*, customers(name)')
                            .eq('id', saleId)
                            .single();
                        
                        if (error) throw error;
                        
                        // Items are usually required for printing
                        const { data: items, error: itemsError } = await supabase
                            .from('transaction_items')
                            .select('*')
                            .eq('transaction_id', saleId);
                        
                        if (itemsError) throw itemsError;

                        const customerName = sale.customers?.name || sale.customer_name || "Walk-in";

                        ReceiptPrinter.print({
                            ...sale,
                            customer_name: customerName,
                            items: items
                        });
                    } catch (e) {
                        console.error("Print Sale Error:", e);
                        alert("Failed to print: " + e.message);
                    }
                }
            };

            window.app = app;

            // Handle messages from internal iframes (like sale-pos.html)
            window.addEventListener('message', (event) => {
                if (event.data === 'CLOSE_INTERNAL_SALES') {
                    app.closeInternalSales();
                } else if (event.data && event.data.type === 'EDIT_SALE') {
                    app.editSale(event.data.id);
                } else if (event.data && event.data.type === 'PRINT_VOUCHER') {
                    app.printSale(event.data.id);
                }
            });

            window.onload = () => app.init();
        </script>
        <!-- Internal Sales View Overlay -->
        <div id="internal-sales-view" class="hidden">
            <iframe id="salePosInternalIframe" src="sale-pos.html"
                style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
</body>

</html>
