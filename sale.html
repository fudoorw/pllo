<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Sale List Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/receipt-print.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Excel Theme Variables */
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --bg-glass: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .sheet-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        /* Toolbar - Spreadsheet Styled */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            height: 40px;
            flex-shrink: 0;
        }

        .toolbar-left,
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0 8px;
            min-width: 200px;
            height: 28px;
        }

        .search-box i {
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 0.75rem;
            padding: 0 6px;
            width: 100%;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box:focus-within {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Interaction Elements */
        .btn {
            height: 28px;
            padding: 0 10px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-light);
        }

        .btn-edit {
            color: var(--primary-light);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .btn-delete {
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .btn-refresh {
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.3);
        }

        /* The Grid */
        .sheet-wrapper {
            flex: 1;
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            overflow: auto;
            position: relative;
        }

        table {
            border-collapse: collapse;
            table-layout: fixed;
            width: 100%;
            font-size: 0.75rem;
        }

        th {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 4px 2px;
            text-align: left;
            white-space: nowrap;
        }

        td {
            border: 1px solid var(--border-color);
            min-height: 40px;
            padding: 0;
            color: var(--text-primary);
        }

        .cell {
            padding: 0 4px;
            height: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cell-number {
            justify-content: flex-end;
            font-variant-numeric: tabular-nums;
            font-family: inherit;
        }

        tr:hover td {
            background: rgba(99, 102, 241, 0.05);
        }

        /* Checkbox Styling */
        .check-col {
            width: 40px;
            text-align: center;
            background: var(--bg-secondary);
            z-index: 45;
        }

        .checkbox-container {
            display: block;
            position: relative;
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin: 0 auto;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 16px;
            width: 16px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            transition: all 0.2s ease;
        }

        .checkbox-container:hover input~.checkmark {
            border-color: var(--primary-light);
            background-color: rgba(255, 255, 255, 0.1);
        }

        .checkbox-container input:checked~.checkmark {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked~.checkmark:after {
            display: block;
            left: 5px;
            top: 2px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 1.5px 1.5px 0;
            transform: rotate(45deg);
        }

        /* Resizer */
        .resizer {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            cursor: col-resize;
            z-index: 60;
            border-right: 1px solid transparent;
        }

        .resizer:hover {
            border-right: 2px solid var(--primary);
        }

        /* Status Pills */
        .status-pill {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-paid {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
        }

        .status-partial {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .status-unpaid {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .voucher-tag {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-light);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.7rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        /* Footer Totals */
        .footer-table {
            width: 100%;
            border-collapse: collapse;
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .footer-table td {
            padding: 8px 12px;
            font-weight: 700;
            font-size: 0.75rem;
            border-right: 1px solid var(--border-color);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .footer-table {
            table-layout: fixed;
            width: 100%;
        }

        .total-label {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
        }

        /* Status Bar */
        .status-bar {
            height: 24px;
            background: var(--bg-tertiary);
            color: var(--text-muted);
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            margin-right: 4px;
            box-shadow: 0 0 5px var(--success);
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Filter Dropdown */
        .filter-dropdown {
            position: absolute;
            top: 40px;
            left: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            min-width: 280px;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(10px);
        }

        .filter-dropdown.show {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filter-header {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .filter-select,
        .filter-search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            padding: 6px 10px;
            font-size: 0.75rem;
            outline: none;
        }

        .filter-footer {
            padding: 10px 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        #load-more-container {
            padding: 15px;
            text-align: center;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
        }

        /* Hide Load More button when not needed */
        #load-more-container {
            display: none !important;
        }
    </style>
</head>

<body>

    <div class="sheet-container">
        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="salesSearch" placeholder="Search sales..." oninput="filterSales(this.value)">
                </div>
                <div class="filter-popup">
                    <button class="btn filter-btn" onclick="toggleFilterPopup()">
                        <i class="fas fa-filter"></i> Filters
                        <span id="filterBadge"
                            style="background: var(--primary); color: white; border-radius: 50%; width: 14px; height: 14px; font-size: 9px; display: none; align-items: center; justify-content: center;">0</span>
                    </button>
                    <div id="filterDropdown" class="filter-dropdown">
                        <div class="filter-header">
                            <span style="font-weight: 700; font-size: 0.75rem;"><i class="fas fa-filter"></i> FILTER
                                DATA</span>
                            <button class="btn" style="padding: 2px 6px; font-size: 0.6rem;"
                                onclick="clearAllFilters()">CLEAR</button>
                        </div>
                        <div class="filter-body">
                            <div class="filter-group">
                                <label>Voucher / Customer</label>
                                <input type="text" id="salesSearchPopup" class="filter-search-input"
                                    placeholder="Search...">
                            </div>
                            <div class="filter-group">
                                <label>Warehouse</label>
                                <select id="filterShop" class="filter-select">
                                    <option value="all">All Locations</option>
                                    <option value="Main Branch">Main Branch</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label>Counter / User</label>
                                <select id="filterCounter" class="filter-select">
                                    <option value="all">All Counters</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label>Payment Method</label>
                                <select id="filterPayment" class="filter-select">
                                    <option value="all">All Methods</option>
                                    <option value="Cash">Cash</option>
                                    <option value="K-Pay">K-Pay</option>
                                    <option value="Wave">Wave</option>
                                    <option value="Card">Card</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label>Payment Status</label>
                                <select id="filterStatus" class="filter-select">
                                    <option value="all">All Status</option>
                                    <option value="Paid">Paid</option>
                                    <option value="Partial">Partial</option>
                                    <option value="Unpaid">Unpaid</option>
                                </select>
                            </div>
                        </div>
                        <div class="filter-footer">
                            <button class="btn btn-refresh" style="background: var(--primary); color: white;"
                                onclick="applyFilters(); toggleFilterPopup();">APPLY FILTERS</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-edit" onclick="editSelectedSale()" title="Edit Selected">
                    <i class="fas fa-edit"></i> EDIT
                </button>
                <button class="btn btn-delete" onclick="bulkDeleteSales()" title="Delete Selected">
                    <i class="fas fa-trash"></i> DELETE
                </button>
                <button class="btn btn-refresh" onclick="refreshSales()">
                    <i class="fas fa-sync-alt"></i> REFRESH
                </button>
            </div>
        </div>

        <!-- Table Grid -->
        <div class="sheet-wrapper" id="gridWrapper">
            <table id="salesTable">
                <thead>
                    <tr>
                        <th class="check-col">
                            <label class="checkbox-container">
                                <input type="checkbox" onchange="toggleAllSales(this)">
                                <span class="checkmark"></span>
                            </label>
                        </th>
                        <th>Date <div class="resizer"></div>
                        </th>
                        <th style="width: 130px;">Voucher <div class="resizer"></div>
                        </th>
                        <th>Customer Name <div class="resizer"></div>
                        </th>
                        <th style="width: 100px;">Shop <div class="resizer"></div>
                        </th>
                        <th style="text-align: right;">Total <div class="resizer"></div>
                        </th>
                        <th style="text-align: right;">Net <div class="resizer"></div>
                        </th>
                        <th style="text-align: right;">Paid <div class="resizer"></div>
                        </th>
                        <th style="text-align: right;">Due <div class="resizer"></div>
                        </th>
                        <th style="text-align: right;">Discount <div class="resizer"></div>
                        </th>
                        <th style="width: 120px;">Status <div class="resizer"></div>
                        </th>
                        <th>Type <div class="resizer"></div>
                        </th>
                        <th>Cashier <div class="resizer"></div>
                        </th>
                        <th>Remark <div class="resizer"></div>
                        </th>
                        <th style="width: 50px;">Action</th>
                    </tr>
                </thead>
                <tbody id="salesBody"></tbody>
            </table>
        </div>

        <div id="load-more-container" style="display: none;">
            <button id="loadMoreBtn" class="btn" onclick="loadMoreSales()">
                <i class="fas fa-plus"></i> LOAD MORE RECORDS
            </button>
        </div>

        <!-- Sticky Footer Totals -->
        <table class="footer-table" id="footerTable">
            <tr>
                <td class="check-col"></td>
                <td></td> <!-- Date -->
                <td></td> <!-- Voucher -->
                <td></td> <!-- Supplier -->
                <td class="total-label" style="text-align: right;">TOTALS</td> <!-- Shop -->
                <td id="footerTotal" class="cell-number">0</td> <!-- Total -->
                <td id="footerNet" class="cell-number">0</td> <!-- Net -->
                <td id="footerPaid" class="cell-number" style="color: var(--success);">0</td> <!-- Paid -->
                <td id="footerRemain" class="cell-number" style="color: var(--danger);">0</td> <!-- Bal -->
                <td></td> <!-- Status -->
                <td></td> <!-- Type -->
                <td></td> <!-- Discount -->
                <td></td> <!-- Counter -->
                <td></td> <!-- Remark -->
                <td></td> <!-- Action -->
            </tr>
        </table>

        <!-- Status Bar -->
        <div class="status-bar">
            <span>
                <div class="sync-dot"></div> SYSTEM SYNCED
            </span>
            <span>RECORDS: <strong id="recordCount">0</strong></span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/receipt-printer.js"></script>
    <script src="js/app-config.js"></script>

    <script>
        let allSales = [];
        let selectedIds = new Set();
        let userMap = {};
        let currentPage = 0;
        let pageSize = 50;
        let isLoading = false;
        let hasMore = true;
        let searchDebounceTimeout;

        function debounce(func, wait) {
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(searchDebounceTimeout);
                    func(...args);
                };
                clearTimeout(searchDebounceTimeout);
                searchDebounceTimeout = setTimeout(later, wait);
            };
        }
        function toggleFilterPopup() {
            document.getElementById('filterDropdown').classList.toggle('show');
            document.querySelector('.filter-btn').classList.toggle('active');
        }

        function closeFilterPopup() {
            document.getElementById('filterDropdown').classList.remove('show');
            document.querySelector('.filter-btn').classList.remove('active');
        }

        function clearAllFilters() {
            document.getElementById('salesSearchPopup').value = '';
            document.getElementById('salesSearch').value = '';
            document.getElementById('filterShop').value = 'all';
            document.getElementById('filterCounter').value = 'all';
            document.getElementById('filterStatus').value = 'all';
            document.getElementById('filterPayment').value = 'all';
            applyFilters();
            closeFilterPopup();
        }

        function getSearchValue() {
            const popupSearch = document.getElementById('salesSearchPopup');
            const mainSearch = document.getElementById('salesSearch');
            return (popupSearch?.value || mainSearch?.value || '');
        }

        function syncSearchInputs(sourceId, targetId) {
            const source = document.getElementById(sourceId);
            const target = document.getElementById(targetId);
            if (source && target) target.value = source.value;
        }

        document.addEventListener('click', function (e) {
            const popup = document.querySelector('.filter-popup');
            if (popup && !popup.contains(e.target)) closeFilterPopup();
        });

        async function init() {
            // Load warehouses and users for name mapping and filters
            try {
                const [profilesRes, warehousesRes] = await Promise.all([
                    supabase.from('user_profiles').select('user_id, display_name'),
                    supabase.from('warehouses').select('id, name')
                ]);

                if (!profilesRes.error && profilesRes.data) {
                    const counterFilter = document.getElementById('filterCounter');
                    profilesRes.data.forEach(u => {
                        userMap[u.user_id] = u.display_name;
                        if (counterFilter) {
                            const opt = document.createElement('option');
                            opt.value = u.user_id;
                            opt.textContent = u.display_name;
                            counterFilter.appendChild(opt);
                        }
                    });
                }

                if (!warehousesRes.error && warehousesRes.data) {
                    const shopFilter = document.getElementById('filterShop');
                    if (shopFilter) {
                        // Clear existing but keep "All" and "Main Branch"
                        shopFilter.innerHTML = '<option value="all">All Locations</option><option value="Main Branch">Main Branch</option>';
                        warehousesRes.data.forEach(w => {
                            const opt = document.createElement('option');
                            opt.value = w.id;
                            opt.textContent = w.name;
                            shopFilter.appendChild(opt);
                        });
                    }
                }
            } catch (err) {
                console.error('Error loading reference data:', err);
            }

            document.getElementById('salesSearchPopup').addEventListener('input', debounce(function () {
                syncSearchInputs('salesSearchPopup', 'salesSearch');
                filterSales(this.value);
                updateFilterBadge();
            }, 300));

            document.getElementById('salesSearch').addEventListener('input', debounce(function () {
                syncSearchInputs('salesSearch', 'salesSearchPopup');
                filterSales(this.value);
                updateFilterBadge();
            }, 300));
            ['filterShop', 'filterCounter', 'filterStatus', 'filterPayment'].forEach(id => {
                document.getElementById(id)?.addEventListener('change', () => { applyFilters(); updateFilterBadge(); });
            });
            await refreshSales();
            setupResizers();
            syncFooterWidths();
        }

        function syncFooterWidths() {
            const headerThs = document.querySelectorAll('#salesTable thead th');
            const footerTds = document.querySelectorAll('#footerTable tr td');
            headerThs.forEach((th, i) => {
                if (footerTds[i]) {
                    footerTds[i].style.width = th.offsetWidth + 'px';
                    footerTds[i].style.minWidth = th.offsetWidth + 'px';
                    footerTds[i].style.maxWidth = th.offsetWidth + 'px';
                }
            });
        }

        function updateFilterBadge() {
            let count = 0;
            if (getSearchValue()) count++;
            if (document.getElementById('filterShop')?.value !== 'all') count++;
            if (document.getElementById('filterCounter')?.value !== 'all') count++;
            if (document.getElementById('filterStatus')?.value !== 'all') count++;
            if (document.getElementById('filterPayment')?.value !== 'all') count++;
            const badge = document.getElementById('filterBadge');
            if (badge) {
                badge.textContent = count;
                badge.style.display = count > 0 ? 'inline-block' : 'none';
            }
        }

        async function loadSales(isMore = false) {
            if (isLoading || (!hasMore && isMore)) return;
            isLoading = true;

            try {
                if (!isMore) {
                    currentPage = 0;
                    allSales = [];
                    hasMore = true;
                }

                const search = (document.getElementById('salesSearch')?.value || '').toLowerCase();
                const shopFilter = document.getElementById('filterShop')?.value || 'all';
                const statusFilter = document.getElementById('filterStatus')?.value || 'all';
                const paymentFilter = document.getElementById('filterPayment')?.value || 'all';

                let query = supabase.from('transactions').select('*, warehouses(name), customers(name)');

                // Server-side filtering
                if (search) {
                    // Try to match voucher OR customer_name column OR joined customers.name
                    // Note: Supabase 'or' with relations can be tricky, using a simpler approach
                    // if search is present, we filter by voucher OR customer_name
                    query = query.or(`voucher_no.ilike.%${search}%,customer_name.ilike.%${search}%`);
                }

                if (shopFilter !== 'all' && shopFilter !== 'Main Branch') {
                    query = query.eq('warehouse_id', shopFilter);
                } else if (shopFilter === 'Main Branch') {
                    // If Main Branch is selected, we usually look for null or a specific ID
                    // For now, let's assume Main Branch means no specific warehouse assigned or first warehouse
                    query = query.or('warehouse_id.is.null'); 
                }

                if (statusFilter !== 'all') {
                    const s = statusFilter.toUpperCase();
                    if (s === 'PAID') {
                        // Include both 'PAID' and legacy 'completed'
                        query = query.or('payment_status.eq.PAID,payment_status.eq.completed');
                    } else if (s === 'UNPAID') {
                        // Include 'UNPAID' and legacy records where paid_amount is 0
                        query = query.or('payment_status.eq.UNPAID,paid_amount.eq.0');
                    } else if (s === 'PARTIAL') {
                        // Include 'PARTIAL' and legacy records where paid > 0 but less than total
                        // Note: Range or complex logic is better handled by post-filtering or strict status saving
                        query = query.eq('payment_status', 'PARTIAL');
                    }
                }

                if (paymentFilter !== 'all') {
                    query = query.ilike('payment_method', `%${paymentFilter}%`);
                }

                const counterVal = document.getElementById('filterCounter')?.value;
                if (counterVal && counterVal !== 'all') {
                    // Check both user_id (new) and counter (legacy) columns
                    query = query.or(`user_id.eq.${counterVal},counter.eq.${counterVal}`);
                }

                const { data, error } = await query
                    .order('created_at', { ascending: false })
                    .range(currentPage * pageSize, (currentPage + 1) * pageSize - 1);

                if (error) throw error;

                if (data && data.length > 0) {
                    allSales = isMore ? allSales.concat(data) : data;
                    currentPage++;
                    if (data.length < pageSize) hasMore = false;
                } else {
                    hasMore = false;
                }

                renderSales(allSales);
                syncFooterWidths();
                updateLoadMoreUI();
            } catch (e) {
                console.error('Load error:', e);
            } finally {
                isLoading = false;
                updateLoadMoreUI();
            }
        }

        function updateLoadMoreUI() {
            const btn = document.getElementById('loadMoreBtn');
            const container = document.getElementById('load-more-container');
            if (btn && container) {
                if (!hasMore) {
                    container.style.display = 'none';
                } else {
                    container.style.display = 'block';
                    btn.innerHTML = isLoading ? '<i class="fas fa-spinner fa-spin"></i> Loading...' : '<i class="fas fa-plus"></i> Load More';
                }
            }
        }

        async function loadMoreSales() {
            await loadSales(true);
        }

        async function refreshSales() {
            await loadSales(false);
        }

        function applyFilters() {
            // Since we implemented server-side search in loadSales, 
            // applyFilters now just triggers a fresh load if needed
            // OR handles purely client-side refinements if we were to keep them.
            // For 8k scale, server-side is better.
            loadSales();
        }

        function renderSales(sales) {
            const body = document.getElementById('salesBody');
            body.innerHTML = '';

            let total = 0, net = 0, paid = 0, remain = 0;

            sales.forEach((sale) => {
                const date = new Date(sale.created_at);
                const dateStr = date.toLocaleString('en-GB', { 
                    day: '2-digit', month: 'short', year: '2-digit', 
                    hour: '2-digit', minute: '2-digit', hour12: true 
                });
                const saleTotal = sale.total || 0;
                const saleNet = sale.net_amount || saleTotal;
                const salePaid = sale.paid_amount || 0;
                const bal = saleNet - salePaid;

                total += saleTotal;
                net += saleNet;
                paid += salePaid;
                remain += bal;

                const tr = document.createElement('tr');
                // Robust status logic
                let statusClass = 'status-unpaid';
                let statusText = 'UNPAID';

                if (bal <= 0) {
                    statusClass = 'status-paid';
                    statusText = 'PAID';
                } else if (salePaid > 0) {
                    statusClass = 'status-partial';
                    statusText = 'PARTIAL';
                }

                tr.innerHTML = `
                    <td class="check-col">
                        <label class="checkbox-container">
                            <input type="checkbox" class="sale-check" data-id="${sale.id}" ${selectedIds.has(sale.id) ? 'checked' : ''} onchange="updateSelection()">
                            <span class="checkmark"></span>
                        </label>
                    </td>
                    <td><div class="cell">${dateStr}</div></td>
                    <td><div class="cell">
                        <span class="voucher-tag">
                            ${sale.voucher_no || (sale.id?.slice(0, 8).toUpperCase() || '-')}
                        </span>
                    </div></td>
                    <td><div class="cell" style="font-weight: 600;">${sale.customers?.name || sale.customer_name || sale.supplier || '-'}</div></td>
                    <td><div class="cell" style="font-weight: 600;">${sale.warehouses?.name || sale.shop || sale.warehouse_name || '-'}</div></td>
                    <td><div class="cell cell-number">${Math.round(sale.total || 0).toLocaleString()}</div></td>
                    <td><div class="cell cell-number">${Math.round(sale.net_amount || sale.total || 0).toLocaleString()}</div></td>
                    <td><div class="cell cell-number" style="color: var(--success);">${Math.round(sale.paid_amount || 0).toLocaleString()}</div></td>
                    <td><div class="cell cell-number" style="color: ${bal > 0 ? 'var(--danger)' : 'var(--success)'}; font-weight: 700;">${Math.round(bal).toLocaleString()}</div></td>
                    <td><div class="cell cell-number" style="color: var(--warning);">${Math.round(sale.discount_amount || 0).toLocaleString()}</div></td>
                    <td><div class="cell"><span class="status-pill ${statusClass}">${statusText}</span></div></td>
                    <td><div class="cell">${(sale.payment_method || sale.payment_type || 'Cash').toUpperCase()}</div></td>
                    <td><div class="cell" style="font-weight: 600; color: var(--primary-light);">${userMap[sale.user_id] || sale.cashier || sale.counter || '-'}</div></td>
                    <td><div class="cell">${sale.remark || '-'}</div></td>
                    <td>
                        <div class="cell" style="justify-content: center; gap: 4px;">
                            <button class="btn" style="padding: 2px 6px; font-size: 0.7rem; background: var(--bg-tertiary); color: var(--primary-light); border: 1px solid rgba(99, 102, 241, 0.3);" 
                                    onclick="editSelectedSale('${sale.id}')" title="Edit Sale">
                                <i class="fas fa-edit" style="font-size: 0.65rem;"></i>
                            </button>
                            <button class="btn" style="padding: 2px 6px; font-size: 0.7rem; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color);" 
                                    onclick="reprintReceipt('${sale.id}')" title="Print Receipt">
                                <i class="fas fa-print" style="font-size: 0.65rem;"></i>
                            </button>
                            <button class="btn" style="padding: 2px 6px; font-size: 0.7rem; background: var(--bg-tertiary); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3);" 
                                    onclick="deleteSale('${sale.id}')" title="Delete Sale">
                                <i class="fas fa-trash" style="font-size: 0.65rem;"></i>
                            </button>
                        </div>
                    </td>
                `;
                body.appendChild(tr);
            });

            document.getElementById('footerTotal').textContent = Math.round(total).toLocaleString();
            document.getElementById('footerNet').textContent = Math.round(net).toLocaleString();
            document.getElementById('footerPaid').textContent = Math.round(paid).toLocaleString();
            document.getElementById('footerRemain').textContent = Math.round(remain).toLocaleString();
            document.getElementById('recordCount').textContent = sales.length;
        }

        async function reprintReceipt(saleId) {
            const sale = allSales.find(s => s.id === saleId);
            if (!sale) return alert('Sale record not found.');

            try {
                // Map the stored items to the format expected by ReceiptPrinter
                // If sale.items is a string, parse it, otherwise use as is
                const items = Array.isArray(sale.items) ? sale.items : (typeof sale.items === 'string' ? JSON.parse(sale.items) : []);

                const printData = {
                    voucher_no: sale.voucher_no || sale.id.slice(0, 8).toUpperCase(),
                    warehouse_id: sale.warehouse_id,
                    customer_name: sale.customers?.name || sale.customer_name || sale.supplier || 'Walk-in',
                    cashier: userMap[sale.user_id] || sale.cashier || sale.counter || 'Admin',
                    subtotal: sale.subtotal || 0,
                    total: sale.total_amount || sale.total || 0,
                    paid_amount: sale.paid_amount || 0,
                    discount_amount: sale.discount_amount || 0,
                    tax_amount: sale.tax_amount || 0,
                    shipping_amount: sale.shipping_amount || 0,
                    payment_method: sale.payment_method || 'Cash',
                    items: items.map(item => ({
                        name: item.product_name || item.name || 'Product',
                        qty: item.quantity || item.qty || 0,
                        price: item.price || item.unit_price || 0,
                        disc: item.discount || item.disc || 0,
                        selectedUnit: item.selectedUnit || 'pcs',
                        pcs_per_box: item.pcs_per_box || 1
                    }))
                };

                if (typeof ReceiptPrinter !== 'undefined') {
                    ReceiptPrinter.print(printData);
                } else {
                    alert('Printer utility not loaded.');
                }
            } catch (err) {
                console.error('Reprint Error:', err);
                alert('Failed to prepare receipt: ' + err.message);
            }
        }

        function filterSales(query) {
            applyFilters();
        }

        function toggleAllSales(master) {
            const checkboxes = document.querySelectorAll('.sale-check');
            checkboxes.forEach(cb => {
                cb.checked = master.checked;
                const id = cb.dataset.id;
                if (master.checked) selectedIds.add(id);
                else selectedIds.delete(id);
            });
        }

        function updateSelection() {
            const checkboxes = document.querySelectorAll('.sale-check');
            selectedIds.clear();
            checkboxes.forEach(cb => {
                if (cb.checked) selectedIds.add(cb.dataset.id);
            });
        }

        async function deleteSale(saleId) {
            if (!confirm('Are you sure you want to delete this sale? This will also remove associated payments and items.')) return;
            try {
                // Delete dependent items and payments first due to FK constraints
                await supabase.from('transaction_items').delete().eq('transaction_id', saleId);
                await supabase.from('transaction_payments').delete().eq('transaction_id', saleId);
                
                const { data, error } = await supabase.from('transactions').delete().eq('id', saleId).select();
                if (error) throw error;
                if (!data || data.length === 0) {
                    throw new Error('Blocked by permissions or record not found. Please ask an admin to check RLS policies.');
                }
                selectedIds.delete(saleId);
                await refreshSales();
            } catch (e) {
                alert('Delete failed: ' + e.message);
            }
        }

        async function bulkDeleteSales() {
            if (selectedIds.size === 0) return alert('Select items to delete first.');
            
            try {
                const ids = Array.from(selectedIds);
                // Delete dependent items and payments first for all selected transactions
                await supabase.from('transaction_items').delete().in('transaction_id', ids);
                await supabase.from('transaction_payments').delete().in('transaction_id', ids);
                
                const { data, error } = await supabase.from('transactions').delete().in('id', ids).select();
                if (error) throw error;
                if (!data || data.length === 0) {
                    throw new Error('Blocked by permissions or records not found. Please ask an admin to check RLS policies.');
                }
                selectedIds.clear();
                await refreshSales();
            } catch (e) {
                alert('Bulk Delete failed: ' + e.message);
            }
        }

        function editSelectedSale(id) {
            let targetId = id;
            if (!targetId) {
                if (selectedIds.size !== 1) return alert('Select exactly one record to edit.');
                targetId = Array.from(selectedIds)[0];
            }

            if (window.parent && typeof window.parent.switchView === 'function') {
                window.parent.switchView('pos', { editId: targetId });
            } else {
                alert('Editing transaction: ' + id);
            }
        }

        function setupResizers() {
            const table = document.querySelector('.sheet-wrapper table');
            if (!table) return;
            const header = table.querySelector('thead');
            if (!header) return;

            let startX = 0;
            let startWidth = 0;
            let activeTh = null;

            header.addEventListener('mousedown', (e) => {
                if (!e.target.classList.contains('resizer')) return;
                activeTh = e.target.closest('th');
                if (!activeTh) return;

                startX = e.pageX;
                startWidth = activeTh.offsetWidth;

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
                document.body.style.cursor = 'col-resize';
            });

            function handleMouseMove(e) {
                if (!activeTh) return;
                const diff = e.pageX - startX;
                const newWidth = Math.max(40, startWidth + diff);
                activeTh.style.width = newWidth + 'px';
                syncFooterWidths();
            }

            function handleMouseUp() {
                document.removeEventListener('mousemove', handleMouseMove);
                document.removeEventListener('mouseup', handleMouseUp);
                document.body.style.cursor = '';
                activeTh = null;
            }
        }

        window.onload = init;
    </script>
</body>

</html>
