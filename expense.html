<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Management</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Tailwind CSS (for modal) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --bg-glass: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary, #0f172a);
            color: var(--text-primary, #f1f5f9);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Glass Toolbar */
        .glass-toolbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-container {
            position: relative;
            width: 280px;
        }

        .search-container i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted, #94a3b8);
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px 8px 36px;
            font-size: 0.8rem;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        /* Buttons */
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-color);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .sync-status {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sync-status.pending {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        /* Bulk Toolbar */
        .bulk-toolbar {
            display: none;
            align-items: center;
            gap: 8px;
        }

        .bulk-toolbar.visible {
            display: flex !important;
        }

        .hidden {
            display: none !important;
        }

        /* Excel Table */
        .sheet-wrapper {
            flex: 1;
            overflow-x: hidden;
            overflow-y: auto;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.8rem 0.75rem;
            text-align: left;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        tr.data-row {
            transition: background 0.2s;
        }

        tr.data-row:hover {
            background: rgba(99, 102, 241, 0.06);
        }

        td {
            padding: 0.7rem 0.75rem;
            font-size: 0.85rem;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        /* ── Special Components ── */
        .ref-badge {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .created-on-box {
            background: rgba(99, 102, 241, 0.15);
            border-radius: 6px;
            padding: 4px 8px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }

        .time-text {
            color: #818cf8;
            font-size: 0.6rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .date-text {
            color: #6366f1;
            font-size: 0.65rem;
            font-weight: 600;
        }

        /* Action Buttons */
        .btn-action {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 4px;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-action-edit {
            color: #818cf8;
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.2);
        }

        .btn-action-edit:hover {
            background: #6366f1;
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-action-delete {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .btn-action-delete:hover {
            background: #ef4444;
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Custom Checkbox */
        .checkbox-container {
            display: block;
            position: relative;
            width: 18px;
            height: 18px;
            cursor: pointer;
            user-select: none;
            margin: 0 auto;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
            z-index: -1;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 18px;
            width: 18px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .checkbox-container:hover input~.checkmark {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: var(--primary-light);
        }

        .checkbox-container input:checked~.checkmark {
            background-color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        .checkbox-container .checkmark:after {
            content: "";
            position: absolute;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            display: none;
        }

        .checkbox-container input:checked~.checkmark:after {
            display: block;
        }

        /* Modal Input Focus */
        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>

<body onload="init()">

    <!-- Glass Toolbar -->
    <div class="glass-toolbar">
        <div class="toolbar-left">
            <span id="syncStatus" class="sync-status">Ready</span>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" placeholder="Search expenses..." id="searchInput"
                    oninput="filterData()">
            </div>
        </div>
        <div class="action-buttons">
            <div id="bulkToolbar" class="bulk-toolbar">
                <span style="font-size: 12px; color: var(--text-secondary);">
                    <span id="selectedCount">0</span> selected
                </span>
                <button class="btn btn-danger" onclick="bulkDelete()">
                    <i class="fas fa-trash"></i> Delete
                </button>
                <button class="btn btn-secondary" onclick="clearSelection()" title="Clear">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <button class="btn btn-secondary" onclick="loadExpenses()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <button class="btn btn-primary" onclick="addNewExpense()">
                <i class="fas fa-plus"></i> Add Expense
            </button>
        </div>
    </div>

    <div class="sheet-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 44px; text-align: center;">
                        <label class="checkbox-container">
                            <input type="checkbox" onchange="toggleSelectAll(this)">
                            <span class="checkmark"></span>
                        </label>
                    </th>
                    <th style="width: 120px;">Reference</th>
                    <th>Expense Title</th>
                    <th>Warehouse</th>
                    <th>Expense Category</th>
                    <th style="width: 150px;">Amount</th>
                    <th style="width: 120px;">Created On</th>
                    <th style="width: 100px; text-align: center;">Action</th>
                </tr>
            </thead>
            <tbody id="expenseTableBody">
                <!-- Rows will be populated here -->
                <tr class="data-row animate-pulse">
                    <td colspan="7" class="text-center py-10 text-muted">Loading data...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Hidden Dialog/Form for Adding/Editing -->
    <div id="expenseModal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[999] flex items-center justify-center hidden"
        onclick="if(event.target===this) closeModal()">
        <div
            class="bg-[#1e293b] border border-white/10 w-full max-w-lg rounded-xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="px-6 py-4 border-b border-white/5 flex justify-between items-center bg-[#6366f1]/10">
                <h3 class="font-bold text-lg" id="modalTitle" style="color: var(--text-primary);">Create New Expense
                </h3>
                <button onclick="closeModal()" style="color: var(--text-muted);"
                    class="hover:text-white transition-colors"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1"
                            style="color: var(--text-muted);">Date</label>
                        <input type="date" id="expDate" class="w-full border rounded-lg px-3 py-2 text-sm outline-none"
                            style="background: rgba(255,255,255,0.05); border-color: var(--border-color); color: var(--text-primary);">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1"
                            style="color: var(--text-muted);">Warehouse</label>
                        <select id="expWarehouse" class="w-full border rounded-lg px-3 py-2 text-sm outline-none"
                            style="background: rgba(255,255,255,0.05); border-color: var(--border-color); color: var(--text-primary);">
                            <!-- Options -->
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase mb-1" style="color: var(--text-muted);">Expense
                        Title</label>
                    <input type="text" id="expTitle" placeholder="e.g. Monthly Electricity Bill"
                        class="w-full border rounded-lg px-3 py-2 text-sm outline-none"
                        style="background: rgba(255,255,255,0.05); border-color: var(--border-color); color: var(--text-primary);">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1"
                            style="color: var(--text-muted);">Category</label>
                        <select id="expCategory" class="w-full border rounded-lg px-3 py-2 text-sm outline-none"
                            style="background: rgba(255,255,255,0.05); border-color: var(--border-color); color: var(--text-primary);">
                            <!-- Options -->
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1"
                            style="color: var(--text-muted);">Amount</label>
                        <div class="relative">
                            <input type="number" id="expAmount" placeholder="0.00"
                                class="w-full border rounded-lg px-3 py-2 text-sm outline-none pr-8"
                                style="background: rgba(255,255,255,0.05); border-color: var(--border-color); color: var(--text-primary);">
                            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold"
                                style="color: var(--text-muted);">Ks</span>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase mb-1" style="color: var(--text-muted);">Payment
                        Method</label>
                    <select id="expMethod" class="w-full border rounded-lg px-3 py-2 text-sm outline-none"
                        style="background: rgba(255,255,255,0.05); border-color: var(--border-color); color: var(--text-primary);">
                        <option style="background: #1e293b;">Cash</option>
                        <option style="background: #1e293b;">Bank Transfer</option>
                        <option style="background: #1e293b;">KBZPay</option>
                        <option style="background: #1e293b;">WavePay</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase mb-1"
                        style="color: var(--text-muted);">Remark</label>
                    <textarea id="expRemark" rows="2"
                        class="w-full border rounded-lg px-3 py-2 text-sm outline-none resize-none"
                        style="background: rgba(255,255,255,0.05); border-color: var(--border-color); color: var(--text-primary);"
                        placeholder="Optional notes..."></textarea>
                </div>
            </div>
            <div class="px-6 py-4 flex justify-end gap-3" style="background: rgba(255,255,255,0.02);">
                <button onclick="closeModal()" class="px-4 py-2 text-sm font-semibold" style="color: var(--text-muted);"
                    class="hover:text-white">Cancel</button>
                <button onclick="commitSave()" class="px-6 py-2 rounded-lg text-sm font-bold transition-all"
                    style="background: var(--primary); color: white;" id="commitBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script>
        let state = {
            data: [],
            filtered: [],
            categories: [],
            warehouses: [],
            editingId: null,
            selectedIds: new Set()
        };

        async function init() {
            checkEmbeddedMode();
            await Promise.all([fetchCategories(), fetchWarehouses(), loadExpenses()]);
            populateSelects();
        }

        // Selection Functions
        function toggleSelectAll(master) {
            const checkboxes = document.querySelectorAll('.selection-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = master.checked;
                const id = cb.dataset.id;
                if (master.checked) state.selectedIds.add(id);
                else state.selectedIds.delete(id);
            });
            updateBulkToolbar();
        }

        function handleSelectionChange(cb) {
            const id = cb.dataset.id;
            if (cb.checked) state.selectedIds.add(id);
            else state.selectedIds.delete(id);
            updateBulkToolbar();
            updateMasterCheckbox();
        }

        function updateMasterCheckbox() {
            const master = document.querySelector('thead input[type="checkbox"]');
            if (!master) return;
            const allSelected = state.filtered.length > 0 && state.filtered.every(r => state.selectedIds.has(r.id));
            master.checked = allSelected;
            master.indeterminate = state.selectedIds.size > 0 && !allSelected;
        }

        function updateBulkToolbar() {
            const toolbar = document.getElementById('bulkToolbar');
            const countEl = document.getElementById('selectedCount');
            if (!toolbar || !countEl) return;

            if (state.selectedIds.size > 0) {
                toolbar.classList.add('visible');
                toolbar.classList.remove('hidden');
                countEl.textContent = state.selectedIds.size;
            } else {
                toolbar.classList.add('hidden');
                toolbar.classList.remove('visible');
            }
        }

        function clearSelection() {
            state.selectedIds.clear();
            const master = document.querySelector('thead input[type="checkbox"]');
            if (master) master.checked = false;
            document.querySelectorAll('.selection-checkbox').forEach(cb => cb.checked = false);
            updateBulkToolbar();
        }

        async function bulkDelete() {
            if (state.selectedIds.size === 0) return;
            if (!confirm(`Delete ${state.selectedIds.size} selected expenses?`)) return;
            try {
                const { error } = await supabase.from('expenses').delete().in('id', Array.from(state.selectedIds));
                if (error) throw error;
                clearSelection();
                await loadExpenses();
                alert('Bulk deletion complete.');
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        function updateSyncStatus(status, type = 'success') {
            const statusEl = document.getElementById('syncStatus');
            if (statusEl) {
                statusEl.textContent = status;
                statusEl.className = 'sync-status';
                if (type === 'pending') statusEl.classList.add('pending');
            }
        }

        function checkEmbeddedMode() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'embedded') {
                // document.getElementById('topHeader').classList.add('hidden');
            }
        }

        async function fetchCategories() {
            const { data } = await supabase.from('expense_categories').select('*').order('name');
            state.categories = data || [];
        }

        async function fetchWarehouses() {
            const { data } = await supabase.from('warehouses').select('id, name').order('name');
            state.warehouses = data || [];
        }

        function populateSelects() {
            const catSelect = document.getElementById('expCategory');
            catSelect.innerHTML = state.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

            const whSelect = document.getElementById('expWarehouse');
            whSelect.innerHTML = state.warehouses.map(w => `<option value="${w.id}">${w.name}</option>`).join('');
        }

        async function loadExpenses() {
            updateSyncStatus('Loading...');
            try {
                const { data, error } = await supabase.from('expenses').select(`
                    *,
                    category:category_id (name),
                    warehouse:warehouse_id (name)
                `).order('created_at', { ascending: false });

                if (error) throw error;
                state.data = data || [];
                state.filtered = state.data;
                renderTable();
                updateSyncStatus('Synced');
            } catch (e) {
                console.error('Error loading expenses:', e);
                updateSyncStatus('Error', 'error');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('expenseTableBody');
            if (state.filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-20 text-muted">No expenses found.</td></tr>';
                return;
            }

            tbody.innerHTML = state.filtered.map(row => {
                const createdAt = new Date(row.created_at);
                const timeStr = createdAt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = ((d) => { const day = String(d.getDate()).padStart(2, '0'); const mon = d.toLocaleString('en-US', { month: 'short' }); return day + '-' + mon + '-' + d.getFullYear(); })(createdAt);
                const isSelected = state.selectedIds.has(row.id);

                return `
                    <tr class="data-row">
                        <td style="text-align: center;">
                            <label class="checkbox-container">
                                <input type="checkbox" class="selection-checkbox" data-id="${row.id}" ${isSelected ? 'checked' : ''} onchange="handleSelectionChange(this)">
                                <span class="checkmark"></span>
                            </label>
                        </td>
                        <td><span class="ref-badge">${row.reference_no || 'Pending'}</span></td>
                        <td class="font-semibold">${row.item}</td>
                        <td>${row.warehouse?.name || '-'}</td>
                        <td>${row.category?.name || 'Uncategorized'}</td>
                        <td class="font-bold" style="color: #818cf8;">${parseFloat(row.amount || 0).toLocaleString()} Ks</td>
                        <td>
                            <div class="created-on-box">
                                <span class="time-text">${timeStr}</span>
                                <span class="date-text">${dateStr}</span>
                            </div>
                        </td>
                        <td class="text-center">
                            <button onclick="editExpense('${row.id}')" class="btn-action btn-action-edit"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteExpense('${row.id}')" class="btn-action btn-action-delete"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');

            updateMasterCheckbox();
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            state.filtered = state.data.filter(it =>
                it.item.toLowerCase().includes(query) ||
                (it.reference_no && it.reference_no.toLowerCase().includes(query)) ||
                (it.warehouse?.name && it.warehouse.name.toLowerCase().includes(query)) ||
                (it.category?.name && it.category.name.toLowerCase().includes(query))
            );
            renderTable();
        }

        function addNewExpense() {
            state.editingId = null;
            document.getElementById('modalTitle').textContent = 'Create New Expense';
            document.getElementById('expDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('expTitle').value = '';
            document.getElementById('expAmount').value = '';
            document.getElementById('expRemark').value = '';
            showModal();
        }

        function editExpense(id) {
            const row = state.data.find(r => r.id === id);
            if (!row) return;

            state.editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Expense: ' + row.reference_no;
            document.getElementById('expDate').value = row.date;
            document.getElementById('expWarehouse').value = row.warehouse_id || '';
            document.getElementById('expTitle').value = row.item;
            document.getElementById('expCategory').value = row.category_id || '';
            document.getElementById('expAmount').value = row.amount;
            document.getElementById('expMethod').value = row.payment_method || 'Cash';
            document.getElementById('expRemark').value = row.remark || '';
            showModal();
        }

        async function deleteExpense(id) {
            if (!confirm('Are you sure you want to delete this expense?')) return;
            const { error } = await supabase.from('expenses').delete().eq('id', id);
            if (!error) loadExpenses();
            else alert('Error deleting: ' + error.message);
        }

        function showModal() { document.getElementById('expenseModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('expenseModal').classList.add('hidden'); }

        async function commitSave() {
            const btn = document.getElementById('commitBtn');
            const item = {
                date: document.getElementById('expDate').value,
                warehouse_id: document.getElementById('expWarehouse').value,
                item: document.getElementById('expTitle').value,
                category_id: document.getElementById('expCategory').value,
                amount: parseFloat(document.getElementById('expAmount').value) || 0,
                payment_method: document.getElementById('expMethod').value,
                remark: document.getElementById('expRemark').value
            };

            if (!item.item || !item.amount) return alert('Reference text and amount are required.');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processing...';

            try {
                if (state.editingId) {
                    const { error } = await supabase.from('expenses').update(item).eq('id', state.editingId);
                    if (error) throw error;
                } else {
                    const { error } = await supabase.from('expenses').insert([item]);
                    if (error) throw error;
                }
                closeModal();
                loadExpenses();
            } catch (e) {
                alert('Error: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Save Changes';
            }
        }

        window.addEventListener('message', (e) => {
            if (e.data.type === 'REFRESH') loadExpenses();
            if (e.data.type === 'ADD_ROW') addNewExpense();
        });
    </script>
