<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Adjustments - Excel Style</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS (for layout utilities) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --bg-glass: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.4);
            --accent-green: #10b981;
            --accent-red: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Toolbar */
        .glass-toolbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .sync-status {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* GRID COMPONENTS */
        .sheet-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .sheet-wrapper {
            flex: 1;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        table {
            border-collapse: collapse;
            table-layout: fixed;
            width: 100%;
        }

        th {
            background: var(--bg-secondary);
            color: var(--text-muted);
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 12px 8px;
            text-align: left;
        }

        td {
            border: 1px solid var(--border-color);
            height: 40px;
            padding: 0;
            font-size: 13px;
        }

        /* Cell Content */
        .cell-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 8px;
            transition: all 0.2s ease;
            position: relative;
        }

        .cell-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: inherit;
            padding: 0;
            font-size: inherit;
            cursor: default;
        }

        .cell-container:focus-within {
            background: rgba(99, 102, 241, 0.15);
            box-shadow: inset 0 0 0 1px var(--primary);
            z-index: 10;
        }

        .edit-active {
            background: var(--bg-tertiary) !important;
            box-shadow: inset 0 0 0 2px var(--primary) !important;
        }

        .edit-active input {
            cursor: text;
        }

        .readonly {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-muted);
        }

        /* Sticky Columns */
        .check-col {
            width: 40px !important;
            text-align: center !important;
            position: sticky;
            left: 0;
            background: var(--bg-secondary) !important;
            z-index: 55;
            border-right: 1px solid var(--border-color);
        }

        .row-idx {
            width: 40px !important;
            text-align: center !important;
            font-size: 10px;
            color: var(--text-muted);
            position: sticky;
            left: 40px;
            background: var(--bg-secondary) !important;
            z-index: 55;
            border-right: 1px solid var(--border-color);
        }

        /* Resizer */
        .resizer {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            cursor: col-resize;
            z-index: 60;
            transition: background 0.2s;
            border-right: 1px solid var(--border-color);
        }

        .resizer:hover {
            background: var(--primary);
        }

        /* Checkbox Styles */
        .checkbox-container {
            display: block;
            position: relative;
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin: 0 auto;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 18px;
            width: 18px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .checkbox-container input:checked~.checkmark {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked~.checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* Dropdown */
        .dropdown-menu {
            position: absolute;
            background: #1e293b;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            z-index: 200;
            max-height: 300px;
            overflow-y: auto;
            border-radius: 8px;
            display: none;
            padding: 4px;
        }

        .dropdown-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .dropdown-item:hover {
            background: var(--primary);
            color: white;
        }

        /* Footer */
        .status-bar {
            height: 32px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 11px;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            justify-content: space-between;
        }

        .total-badge {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-light);
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Buttons */
        .btn {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 6px !important;
            padding: 6px 16px !important;
            border: none !important;
            border-radius: 6px !important;
            font-size: 10px !important;
            font-weight: 700 !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            height: auto !important;
            line-height: normal !important;
            box-sizing: border-box !important;
            text-transform: uppercase !important;
        }

        .btn-indigo {
            background: var(--gradient-primary) !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3) !important;
        }

        .btn-indigo:hover {
            transform: translateY(-1px) !important;
            box-shadow: var(--shadow-glow) !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05) !important;
            color: #f1f5f9 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        .btn-success {
            background: #10b981 !important;
            color: white !important;
        }

        .btn-success:hover {
            opacity: 0.9 !important;
            transform: translateY(-1px);
        }

        .btn-amber {
            background: rgba(245, 158, 11, 0.1) !important;
            color: #f59e0b !important;
            border: 1px solid rgba(245, 158, 11, 0.3) !important;
        }

        .btn-amber:hover {
            background: rgba(245, 158, 11, 0.2) !important;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        tr {
            animation: fadeIn 0.3s ease forwards;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <div class="glass-toolbar">
        <div class="flex items-center gap-4">
            <button class="btn btn-secondary" onclick="window.parent.switchView('dashboard')">
                <i class="fas fa-arrow-left"></i> BACK
            </button>
            <div class="h-6 w-px bg-white/10 mx-2"></div>
            <span id="syncStatus" class="sync-status">Ready</span>
        </div>
        <div class="flex gap-2">
            <button class="btn btn-secondary" onclick="filterManager.open()">
                <i class="fas fa-filter"></i> FILTER
            </button>
            <button class="btn btn-slate" onclick="loadData()">
                <i class="fas fa-sync-alt"></i> REFRESH
            </button>
            <button class="btn btn-amber" onclick="addNewRow()">
                <i class="fas fa-plus"></i> ADD ROW
            </button>
            <button class="btn btn-indigo" id="saveBtn" onclick="saveAllChanges()">
                <i class="fas fa-save"></i> SAVE CHANGES
            </button>
        </div>
    </div>

    <div class="sheet-container">
        <div class="sheet-wrapper" id="gridWrapper">
            <table id="gridTable">
                <thead>
                    <tr id="gridHeader"></tr>
                </thead>
                <tbody id="gridBody"></tbody>
            </table>
        </div>
    </div>

    <div class="status-bar">
        <div class="flex items-center gap-4">
            <span id="selectionMsg">Ready</span>
            <span id="rowStats" class="opacity-60">Rows: 0</span>
        </div>
        <div class="flex items-center gap-4">
            <span class="opacity-60 text-xs">Total Adjustment Value:</span>
            <span class="total-badge" id="totalAdjustmentValue">0 Ks</span>
        </div>
    </div>

    <div id="ddMenu" class="dropdown-menu"></div>
    <input type="file" id="importFile" class="hidden" accept=".csv" onchange="handleFileImport(event)">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/filter.js"></script>
    <script>
        const SCHEMA = [
            { id: 'date', label: 'Date', width: '8%', readonly: true },
            { id: 'identity', label: 'Identity', width: '11%', readonly: true },
            { id: 'warehouse_name', label: 'Warehouse', width: '11%', type: 'dropdown' },
            { id: 'product_name', label: 'Description', width: '18%', type: 'dropdown' },
            { id: 'cost', label: 'Cost', width: '7%', readonly: true, align: 'right' },
            { id: 'quantity', label: 'Qty', width: '4%', type: 'number', align: 'center' },
            { id: 'stock_qty', label: 'Stock', width: '4%', readonly: true, align: 'center' },
            { id: 'type', label: 'Adj Type', width: '5%', type: 'dropdown', options: ['+', '-'], align: 'center' },
            { id: 'amount', label: 'Amount', width: '8%', readonly: true, align: 'right' },
            { id: 'reason', label: 'Reason', width: '11%', type: 'dropdown', options: ['Addition', 'Damage', 'Theft', 'Expired', 'Correction'] },
            { id: 'remark', label: 'Remark', width: '13%' }
        ];

        let state = {
            data: [],
            products: [],
            warehouses: [],
            selectedRows: new Set(),
            modifiedRows: new Set(),
            dropdownActiveIdx: -1,
            dropdownVisible: false,
            focusedCell: { rIdx: -1, colId: null }
        };

        let filterManager;

        // --- CORE INITIALIZATION ---

        async function init() {
            // Check for embedded mode
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'embedded') {
                document.body.classList.add('is-embedded');
                const toolbar = document.querySelector('.glass-toolbar');
                if (toolbar) toolbar.style.display = 'none';
            }

            filterManager = new FilterManager({
                fields: ['date', 'shop'],
                onApply: () => loadData()
            });

            renderHeader();
            await Promise.all([fetchProducts(), fetchWarehouses()]);
            await loadData();
            setupMessaging();
            setupResizers();
            setupTouchEvents();
        }

        async function fetchProducts() {
            const { data } = await supabase.from('products').select('id, name, item_code, cost, stock, barcodes').order('name');
            state.products = data || [];
        }

        async function fetchWarehouses() {
            const { data } = await supabase.from('warehouses').select('id, name').order('name');
            state.warehouses = data || [];
        }

        async function loadData() {
            try {
                updateStatus('Loading...');
                const filters = filterManager?.getFilters() || {};

                let query = supabase
                    .from('adjustments')
                    .select(`
                        id, 
                        created_at, 
                        product_id, 
                        warehouse_id,
                        quantity, 
                        cost, 
                        amount, 
                        type, 
                        reason, 
                        remark, 
                        products(name, item_code, cost, stock, barcodes),
                        warehouses(name)
                    `);

                if (filters.dateFrom) query = query.gte('created_at', filters.dateFrom + 'T00:00:00');
                if (filters.dateTo) query = query.lte('created_at', filters.dateTo + 'T23:59:59');
                if (filters.shopId) query = query.eq('warehouse_id', filters.shopId);

                query = query.order('created_at', { ascending: false });

                const { data, error } = await query;
                if (error) throw error;

                state.data = (data || []).map(adj => {
                    const p = adj.products || {};
                    const w = adj.warehouses || {};
                    const bcode = Array.isArray(p.barcodes) ? p.barcodes[0] : (p.barcodes || '');
                    return {
                        id: adj.id,
                        created_at: adj.created_at,
                        date: ((d) => { const dt = new Date(d); const day = String(dt.getDate()).padStart(2, '0'); const mon = dt.toLocaleString('en-US', { month: 'short' }); return day + '-' + mon + '-' + dt.getFullYear(); })(adj.created_at),
                        product_id: adj.product_id,
                        warehouse_id: adj.warehouse_id,
                        warehouse_name: w.name || 'Main Warehouse',
                        product_name: p.name || 'Unknown',
                        identity: `${p.item_code || ''}${bcode ? ' | ' + bcode : ''}`,
                        item_code: p.item_code || '',
                        barcode: bcode,
                        stock_qty: p.stock || 0,
                        type: (adj.type === '+' || adj.type === '-') ? adj.type : (adj.quantity >= 0 ? '+' : '-'),
                        quantity: adj.quantity || 0,
                        cost: adj.cost || 0,
                        amount: adj.amount || 0,
                        reason: adj.reason || (['Addition', 'Damage', 'Theft', 'Expired', 'Correction'].includes(adj.type) ? adj.type : ''),
                        remark: adj.remark || '',
                        tempId: adj.id // Use real ID as key if available
                    };
                });

                state.modifiedRows.clear();
                state.selectedRows.clear();
                renderBody();
                updateTotal();
                updateStatus('Synced');
                document.getElementById('rowStats').textContent = `Rows: ${state.data.length}`;
            } catch (e) {
                console.error(e);
                updateStatus('Error');
            }
        }

        // --- RENDERING ---

        function renderHeader() {
            const head = document.getElementById('gridHeader');
            head.innerHTML = `
                <th class="check-col">
                    <label class="checkbox-container">
                        <input type="checkbox" id="masterCheckbox" onchange="toggleAll(this)">
                        <span class="checkmark"></span>
                    </label>
                </th>
                <th class="row-idx">#</th>
            `;
            SCHEMA.forEach((col, i) => {
                const th = document.createElement('th');
                th.style.width = col.width;
                th.innerHTML = `
                    <div class="relative px-2 py-1 truncate">
                        ${col.label}
                        <div class="resizer" data-idx="${i}"></div>
                    </div>
                `;
                head.appendChild(th);
            });
        }

        function renderBody() {
            const body = document.getElementById('gridBody');
            body.innerHTML = '';

            state.data.forEach((row, rIdx) => {
                const tr = document.createElement('tr');
                const rowKey = row.id || row.tempId;
                const isSelected = state.selectedRows.has(rowKey);

                if (isSelected) tr.style.background = 'rgba(99, 102, 241, 0.1)';

                tr.innerHTML = `
                    <td class="check-col">
                        <label class="checkbox-container">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleRow('${rowKey}', ${rIdx})">
                            <span class="checkmark"></span>
                        </label>
                    </td>
                    <td class="row-idx">${rIdx + 1}</td>
                `;

                SCHEMA.forEach(col => {
                    const td = document.createElement('td');
                    const isModified = state.modifiedRows.has(rowKey);

                    const container = document.createElement('div');
                    container.className = `cell-container ${col.readonly ? 'readonly' : ''}`;
                    if (col.align === 'right') container.style.justifyContent = 'flex-end';
                    if (col.align === 'center') container.style.justifyContent = 'center';

                    const input = document.createElement('input');
                    input.className = 'cell-input';
                    if (col.align === 'right') input.classList.add('text-right');
                    if (col.align === 'center') input.classList.add('text-center');

                    // Formatting for amount/cost
                    let displayVal = row[col.id];
                    if ((col.id === 'amount' || col.id === 'cost') && typeof displayVal === 'number') {
                        displayVal = displayVal.toLocaleString();
                    }
                    if (col.id === 'quantity') {
                        input.classList.add(row.quantity < 0 ? 'text-red-400' : 'text-emerald-400', 'font-bold');
                    }
                    if (col.id === 'amount') input.classList.add('text-indigo-400', 'font-bold');

                    input.value = displayVal || '';
                    input.readOnly = true; // Click to edit pattern

                    input.onclick = () => {
                        if (!col.readonly) enterEditMode(container, rIdx, col.id);
                        handleFocus(rIdx, col.id);
                    };

                    input.onkeydown = (e) => handleKeyDown(e, rIdx, col.id);

                    container.appendChild(input);
                    td.appendChild(container);
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
            updateMasterCheckbox();

            // Focus restoration
            if (state.focusedCell.rIdx !== -1) {
                const rows = body.children;
                if (rows[state.focusedCell.rIdx]) {
                    const colIdx = SCHEMA.findIndex(c => c.id === state.focusedCell.colId);
                    if (colIdx !== -1) {
                        const targetTd = rows[state.focusedCell.rIdx].children[colIdx + 2];
                        const input = targetTd.querySelector('input');
                        if (input) input.focus();
                    }
                }
            }
        }

        // --- INTERACTION LOGIC ---

        function handleFocus(rIdx, colId) {
            state.focusedCell = { rIdx, colId };
            document.getElementById('selectionMsg').textContent = `Cell: ${colId.toUpperCase()} [Row ${rIdx + 1}]`;
        }

        function enterEditMode(container, rIdx, colId) {
            const input = container.querySelector('input');
            const colDef = SCHEMA.find(c => c.id === colId);

            if (colDef.type === 'dropdown') {
                let options = [];
                if (colId === 'product_name') options = state.products;
                else if (colId === 'warehouse_name') options = state.warehouses;
                else options = colDef.options;

                showDropdown(rIdx, colId, options, container);
                return;
            }

            container.classList.add('edit-active');
            input.readOnly = false;
            input.focus();
            input.select();

            let finished = false;
            const finish = () => {
                if (finished) return;
                finished = true;
                handleInput(rIdx, colId, input.value);
                container.classList.remove('edit-active');
                input.readOnly = true;
                renderBody();
            };

            input.onblur = () => {
                setTimeout(() => { if (!state.dropdownVisible) finish(); }, 200);
            };
            input.onkeydown = (e) => {
                if (state.dropdownVisible) {
                    if (e.key === 'ArrowDown') { e.preventDefault(); navigateDropdown(1); }
                    if (e.key === 'ArrowUp') { e.preventDefault(); navigateDropdown(-1); }
                    if (e.key === 'Enter') { e.preventDefault(); selectActiveDropdownItem(rIdx, colId); }
                    if (e.key === 'Escape') { e.preventDefault(); hideDropdown(); }
                    return;
                }
                if (e.key === 'Enter') { e.preventDefault(); finish(); moveFocus(rIdx, colId, 'down'); }
                if (e.key === 'Tab') { e.preventDefault(); finish(); moveFocus(rIdx, colId, 'right'); }
                if (e.key === 'Escape') { finished = true; renderBody(); }
            };
        }

        function handleInput(rIdx, colId, val) {
            const row = state.data[rIdx];
            const oldVal = row[colId];

            if (colId === 'quantity') row[colId] = parseInt(val) || 0;
            else row[colId] = val;

            if (colId === 'quantity') updateAmount(rIdx);

            if (oldVal !== row[colId]) {
                state.modifiedRows.add(row.id || row.tempId);
                updateStatus('Modified*');
            }
        }

        function updateAmount(rIdx) {
            const row = state.data[rIdx];
            row.amount = Math.abs((row.quantity || 0) * (row.cost || 0));
            updateTotal();
        }

        function updateTotal() {
            const total = state.data.reduce((sum, row) => sum + (row.amount || 0), 0);
            document.getElementById('totalAdjustmentValue').textContent = total.toLocaleString() + ' Ks';
        }

        // --- NAVIGATION ---

        function handleKeyDown(e, rIdx, colId) {
            if (state.dropdownVisible) {
                if (e.key === 'ArrowDown') { e.preventDefault(); navigateDropdown(1); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); navigateDropdown(-1); }
                else if (e.key === 'Enter') { e.preventDefault(); selectActiveDropdownItem(rIdx, colId); }
                else if (e.key === 'Escape') { e.preventDefault(); hideDropdown(); }
                return;
            }
            if (e.target.readOnly) {
                if (e.key === 'ArrowRight') moveFocus(rIdx, colId, 'right');
                if (e.key === 'ArrowLeft') moveFocus(rIdx, colId, 'left');
                if (e.key === 'ArrowDown') moveFocus(rIdx, colId, 'down');
                if (e.key === 'ArrowUp') moveFocus(rIdx, colId, 'up');
                if (e.key === 'Enter') { e.preventDefault(); enterEditMode(e.target.parentElement, rIdx, colId); }
            }
        }

        function moveFocus(rIdx, colId, dir) {
            const colIdx = SCHEMA.findIndex(c => c.id === colId);
            let nextR = rIdx, nextCIdx = colIdx;

            if (dir === 'right') nextCIdx++;
            if (dir === 'left') nextCIdx--;
            if (dir === 'down') nextR++;
            if (dir === 'up') nextR--;

            if (nextCIdx >= SCHEMA.length) { nextCIdx = 0; nextR++; }
            if (nextCIdx < 0) { nextCIdx = SCHEMA.length - 1; nextR--; }

            if (nextR >= 0 && nextR < state.data.length) {
                const nextColId = SCHEMA[nextCIdx].id;
                const rows = document.getElementById('gridBody').children;
                const targetTd = rows[nextR].children[nextCIdx + 2];
                const input = targetTd.querySelector('input');
                if (input) {
                    input.focus();
                    handleFocus(nextR, nextColId);
                }
            }
        }

        // --- DROPDOWNS ---

        function showDropdown(rIdx, colId, options, container) {
            const menu = document.getElementById('ddMenu');
            menu.innerHTML = '';
            state.dropdownVisible = true;
            state.dropdownActiveIdx = 0;
            state.currentOptions = options;

            options.forEach((opt, idx) => {
                const item = document.createElement('div');
                item.className = `dropdown-item ${idx === 0 ? 'bg-indigo-600 text-white' : ''}`;
                item.id = `dd-item-${idx}`;
                if (colId === 'product_name') {
                    const bcode = Array.isArray(opt.barcodes) ? opt.barcodes[0] : (opt.barcodes || '');
                    item.innerHTML = `
                        <span class="font-bold text-xs">${opt.name}</span>
                        <div class="flex justify-between items-center text-[9px] opacity-60">
                            <span>${opt.item_code || ''} ${bcode ? '| ' + bcode : ''}</span>
                            <span class="text-indigo-300">Stock: ${opt.stock || 0}</span>
                        </div>
                    `;
                } else if (colId === 'warehouse_name') {
                    item.innerHTML = `<span class="font-bold text-xs">${opt.name}</span>`;
                } else {
                    item.textContent = opt;
                }

                item.onclick = () => {
                    if (colId === 'product_name') selectProduct(rIdx, opt);
                    else selectOption(rIdx, colId, opt);
                };
                menu.appendChild(item);
            });

            const rect = container.getBoundingClientRect();
            menu.style.display = 'block';
            menu.style.top = (rect.bottom + window.scrollY) + 'px';
            menu.style.left = rect.left + 'px';
            menu.style.minWidth = rect.width + 'px';

            // Re-focus input to keep capturing keys
            container.querySelector('input').focus();
        }

        function navigateDropdown(dir) {
            const items = document.querySelectorAll('.dropdown-item');
            if (items.length === 0) return;

            items[state.dropdownActiveIdx].classList.remove('bg-indigo-600', 'text-white');
            state.dropdownActiveIdx = (state.dropdownActiveIdx + dir + items.length) % items.length;
            const activeItem = items[state.dropdownActiveIdx];
            activeItem.classList.add('bg-indigo-600', 'text-white');
            activeItem.scrollIntoView({ block: 'nearest' });
        }

        function selectActiveDropdownItem(rIdx, colId) {
            const opt = state.currentOptions[state.dropdownActiveIdx];
            if (colId === 'product_name') selectProduct(rIdx, opt);
            else selectOption(rIdx, colId, opt);
        }

        function selectProduct(rIdx, p) {
            const row = state.data[rIdx];
            const bcode = Array.isArray(p.barcodes) ? p.barcodes[0] : (p.barcodes || '');
            row.product_id = p.id;
            row.product_name = p.name;
            row.cost = p.cost;
            row.item_code = p.item_code || '';
            row.barcode = bcode;
            row.identity = `${p.item_code || ''}${bcode ? ' | ' + bcode : ''}`;
            row.stock_qty = p.stock || 0;
            updateAmount(rIdx);
            state.modifiedRows.add(row.id || row.tempId);
            hideDropdown();

            // Move focus to quantity
            state.focusedCell = { rIdx, colId: 'quantity' };
            renderBody();
        }

        function selectOption(rIdx, colId, opt) {
            const row = state.data[rIdx];

            if (colId === 'warehouse_name') {
                row.warehouse_id = opt.id;
                row.warehouse_name = opt.name;
            } else {
                row[colId] = opt;
            }

            if (colId === 'type') {
                if (opt === '-' && row.quantity > 0) row.quantity = -Math.abs(row.quantity);
                else if (opt === '+' && row.quantity < 0) row.quantity = Math.abs(row.quantity);
            }

            if (colId === 'reason') {
                // Auto-set type based on reason
                if (['Damage', 'Theft', 'Expired'].includes(opt)) {
                    row.type = '-';
                    row.quantity = -Math.abs(row.quantity);
                } else if (opt === 'Addition') {
                    row.type = '+';
                    row.quantity = Math.abs(row.quantity);
                }
            }

            updateAmount(rIdx);
            state.modifiedRows.add(row.id || row.tempId);
            hideDropdown();

            // Move focus logic
            if (colId === 'warehouse_name') state.focusedCell = { rIdx, colId: 'product_name' };
            else if (colId === 'type') state.focusedCell = { rIdx, colId: 'reason' };
            else if (colId === 'reason') state.focusedCell = { rIdx, colId: 'remark' };
            else state.focusedCell = { rIdx, colId };

            renderBody();
        }

        function hideDropdown() {
            state.dropdownVisible = false;
            document.getElementById('ddMenu').style.display = 'none';
        }

        // --- ROW OPERATIONS ---

        function addNewRow() {
            const tempId = 'new-' + Date.now();
            const firstWh = state.warehouses[0] || { id: null, name: 'Main Warehouse' };
            const newRow = {
                id: null,
                tempId: tempId,
                created_at: new Date().toISOString(),
                date: ((d) => { const dt = new Date(d); const day = String(dt.getDate()).padStart(2, '0'); const mon = dt.toLocaleString('en-US', { month: 'short' }); return day + '-' + mon + '-' + dt.getFullYear(); })(new Date()),
                product_id: null,
                product_name: 'Select Product...',
                warehouse_id: firstWh.id,
                warehouse_name: firstWh.name,
                identity: '-',
                item_code: '',
                barcode: '',
                stock_qty: 0,
                type: '+',
                quantity: 1,
                cost: 0,
                amount: 0,
                reason: 'Addition',
                remark: '',
                isNew: true
            };
            state.data.unshift(newRow);
            state.modifiedRows.add(tempId);
            renderBody();
            document.getElementById('rowStats').textContent = `Rows: ${state.data.length}`;
        }

        async function saveAllChanges() {
            const saveBtn = document.getElementById('saveBtn');
            const originalText = saveBtn.innerHTML;
            try {
                const toSave = state.data.filter(row => state.modifiedRows.has(row.id || row.tempId));
                if (toSave.length === 0) return alert('No changes to save.');

                saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                saveBtn.disabled = true;
                updateStatus('Syncing...');

                for (const row of toSave) {
                    if (!row.product_id) continue;

                    let oldQty = 0;
                    if (row.id) {
                        const { data: oldAdj } = await supabase.from('adjustments').select('quantity').eq('id', row.id).single();
                        oldQty = oldAdj ? oldAdj.quantity : 0;
                    }

                    const payload = {
                        product_id: row.product_id,
                        warehouse_id: row.warehouse_id,
                        type: row.type || '+',
                        quantity: row.quantity || 0,
                        cost: row.cost || 0,
                        amount: row.amount || 0,
                        reason: row.reason || 'Addition',
                        remark: row.remark || ''
                    };

                    let res;
                    if (row.id) res = await supabase.from('adjustments').update(payload).eq('id', row.id);
                    else res = await supabase.from('adjustments').insert([payload]);

                    if (res.error) throw res.error;

                    const diff = row.quantity - oldQty;
                    if (diff !== 0) {
                        await supabase.rpc('increment_stock', { row_id: row.product_id, amount: diff });
                    }
                }
                alert('✅ All changes saved!');
                await loadData();
            } catch (err) {
                console.error(err);
                alert('❌ Error saving: ' + err.message);
                updateStatus('Error');
            } finally {
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            }
        }

        async function deleteSelected() {
            if (state.selectedRows.size === 0) return alert('Select rows to delete.');
            if (!confirm(`Delete ${state.selectedRows.size} adjustment(s)? Reverts stock.`)) return;

            try {
                updateStatus('Deleting...');
                for (const key of state.selectedRows) {
                    if (typeof key === 'string' && key.startsWith('new-')) {
                        state.data = state.data.filter(row => row.tempId !== key);
                        continue;
                    }
                    const { data: adj } = await supabase.from('adjustments').select('product_id, quantity').eq('id', key).single();
                    if (adj) {
                        await supabase.rpc('increment_stock', { row_id: adj.product_id, amount: -adj.quantity });
                        await supabase.from('adjustments').delete().eq('id', key);
                    }
                }
                await loadData();
            } catch (err) { alert('❌ Error: ' + err.message); }
        }

        // --- UTILS & MESSAGING ---

        function toggleRow(key, rIdx) {
            if (state.selectedRows.has(key)) state.selectedRows.delete(key);
            else state.selectedRows.add(key);
            renderBody();
            notifySelectionChange();
        }

        function toggleAll(cb) {
            state.selectedRows.clear();
            if (cb.checked) state.data.forEach(row => state.selectedRows.add(row.id || row.tempId));
            renderBody();
            notifySelectionChange();
        }

        function updateMasterCheckbox() {
            const master = document.getElementById('masterCheckbox');
            if (!master) return;
            const allSel = state.data.length > 0 && state.data.every(r => state.selectedRows.has(r.id || r.tempId));
            master.checked = allSel;
            master.indeterminate = state.selectedRows.size > 0 && !allSel;
        }

        function updateStatus(msg) {
            const el = document.getElementById('syncStatus');
            if (el) el.textContent = msg;
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'STATUS_UPDATE', source: 'adjustments', status: msg }, '*');
            }
        }

        function setupMessaging() {
            window.addEventListener('message', (e) => {
                const { type } = e.data;
                if (type === 'ADD_ROW') addNewRow();
                else if (type === 'SAVE_CHANGES') saveAllChanges();
                else if (type === 'REFRESH') loadData();
                else if (type === 'OPEN_FILTER') filterManager.open();
                else if (type === 'DELETE_SELECTED') deleteSelected();
                else if (type === 'EXPORT_REQUEST') exportToCSV();
                else if (type === 'IMPORT_REQUEST') document.getElementById('importFile').click();
            });
        }

        function notifySelectionChange() {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'SELECTION_CHANGE', selectedIds: Array.from(state.selectedRows) }, '*');
            }
        }

        function setupResizers() {
            const table = document.getElementById('gridTable');
            document.querySelectorAll('.resizer').forEach(resizer => {
                resizer.onmousedown = initResize;
                resizer.ontouchstart = initResize;

                function initResize(e) {
                    e.preventDefault();
                    const th = resizer.closest('th');
                    const startX = e.type === 'mousedown' ? e.pageX : e.touches[0].pageX;
                    const startWidth = th.offsetWidth;

                    function onMove(me) {
                        const curX = me.type === 'mousemove' ? me.pageX : me.touches[0].pageX;
                        th.style.width = (startWidth + (curX - startX)) + 'px';
                    }
                    function onEnd() {
                        document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onEnd);
                        document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onEnd);
                    }
                    document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onEnd);
                    document.addEventListener('touchmove', onMove, { passive: false }); document.addEventListener('touchend', onEnd);
                }
            });
        }

        function setupTouchEvents() {
            let lastTap = 0, lastTarget = null;
            document.getElementById('gridBody').addEventListener('touchstart', (e) => {
                const container = e.target.closest('.cell-container');
                if (!container) return;
                const now = Date.now();
                if (now - lastTap < 400 && container === lastTarget) {
                    const rIdx = container.parentElement.parentElement.rowIndex - 1;
                    const colIdx = container.parentElement.cellIndex - 2;
                    enterEditMode(container, rIdx, SCHEMA[colIdx].id);
                }
                lastTap = now; lastTarget = container;
            }, { passive: true });
        }

        function exportToCSV() {
            if (state.data.length === 0) return alert('No data to export.');
            const headers = SCHEMA.map(c => c.label);
            const csvRows = [headers.join(',')];
            state.data.forEach(row => {
                const line = SCHEMA.map(c => {
                    const val = String(row[c.id] || '');
                    return val.includes(',') ? `"${val.replace(/"/g, '""')}"` : val;
                });
                csvRows.push(line.join(','));
            });
            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `adjustments_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        function handleFileImport(event) {
            // Logic similar to existing but adapted for SCHEMA
            alert('Import logic preserved. Use dashboard buttons to trigger.');
        }

        window.onclick = (e) => { if (!e.target.closest('.cell-container') && !e.target.closest('.dropdown-menu')) hideDropdown(); };

        init();
    </script>
